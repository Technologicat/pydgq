name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install linters
        run: pip install flake8 cython-lint

      - name: Lint Python (hard errors)
        run: >
          flake8 tests/ pydgq/__init__.py pydgq/data.py pydgq/utils/precalc.py
          pydgq/utils/listutils.py pydgq/utils/mpi_shim.py pydgq/examples/__init__.py
          --select=E9,F63,F7,F82 --show-source

      - name: Lint Python (warnings)
        run: >
          flake8 tests/ pydgq/__init__.py pydgq/data.py pydgq/utils/precalc.py
          pydgq/utils/listutils.py pydgq/utils/mpi_shim.py pydgq/examples/__init__.py
          --exit-zero --max-line-length=200

      - name: Lint Cython
        run: >
          cython-lint
          pydgq/solver/*.pyx pydgq/solver/*.pxd
          pydgq/utils/discontify.pyx
          pydgq/examples/example_kernel.pyx pydgq/examples/example_kernel.pxd
          || true

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install meson-python meson ninja Cython numpy pylu

      - name: Install package
        run: pip install --no-build-isolation -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v

  build-wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_TEST_REQUIRES: pytest numpy pylu
          CIBW_TEST_COMMAND: pytest {project}/tests/ -v

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
